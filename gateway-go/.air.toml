# Config file for [Air](https://github.com/air-verse/air) in TOML format

# Working directory
# . or absolute path, please note that the subdirectories under must be under root.
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old go build
  cmd = "go build -o ./tmp/main.exe main.go"
  # Binary file yields from `cmd`.
  bin = "./tmp/main.exe"
  # Customize binary
  full_bin = ""
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Reject these directories.
  exclude_dir = ["assets", "tmp", "vendor"]
  # Watch these directories if you specified.
  include_dir = []
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  exclude_regex = ["_test.go"]
  # Exclude unchanged files.
  exclude_unchanged = false
  # Follow symlink for directories
  follow_symlink = false
  # This log file places in your tmp_dir.
  log = "build-errors.log"
  # It's not necessary to trigger build each time file changes if it's too frequent.
  delay = 1000 # ms
  # Stop to run old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process (useful for Go on Windows/Linux to clean up)
  send_interrupt = true
  # Delay before killing process
  kill_delay = "500ms"

[color]
  # Customize each part's color. If no color found, use the raw log.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  # Show time
  time = false

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
